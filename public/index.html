<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KasTip — coming soon</title>
<meta name="description" content="Tip Kaspa (KAS) to anyone on X with one click. Non-custodial, flat 0.1 KAS fee.">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#0d0f1a;
    color:#e8eaed;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:2rem;
  }
  .wrap{max-width:560px;text-align:center}
  .logo{
    font-size:3.5rem;font-weight:800;letter-spacing:-0.04em;
    background:linear-gradient(135deg,#49e9c9 0%,#2bb89c 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    margin-bottom:.5rem;
  }
  .tagline{font-size:1.15rem;color:#a8b1c2;margin-bottom:2.5rem;line-height:1.5}
  .status{
    display:inline-block;padding:.4rem 1rem;border-radius:99px;
    background:rgba(73,233,201,.1);color:#49e9c9;font-size:.85rem;
    border:1px solid rgba(73,233,201,.3);font-weight:500;
  }
  .footer{margin-top:3rem;font-size:.85rem;color:#5a6378}
  .footer a{color:#a8b1c2;text-decoration:none;border-bottom:1px solid #3a4356}
  .footer a:hover{color:#49e9c9;border-color:#49e9c9}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">KasTip</div>
  <p class="tagline">Tip Kaspa (KAS) to anyone on X with one click.<br>Non-custodial. Flat 0.1 KAS fee.</p>
  <span class="status">⚡ Coming soon — building MVP</span>
  <div class="footer">Powered by <a href="https://kaspa.org" target="_blank" rel="noopener">Kaspa</a></div>
</div>
</body>
</html>
